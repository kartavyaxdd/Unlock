name: Build Unsigned IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Build iPhone app without signing
        run: |
          xcodebuild \
            -project MentalismApp.xcodeproj \
            -scheme MentalismApp \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package unsigned IPA
        run: bash scripts/package_unsigned_ipa.sh MentalismApp DerivedData/Build/Products/Release-iphoneos/MentalismApp.app artifacts

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: mentalismapp-unsigned-ipa
          path: |
            artifacts/MentalismApp-unsigned.ipa
            DerivedData/Build/Products/Release-iphoneos/MentalismApp.app
